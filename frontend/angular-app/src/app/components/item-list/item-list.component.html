<h2>Items</h2>
<button (click)="addItem()">Add Item</button>
<table border="1" cellpadding="8">
  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Description</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let item of items">
    <td>{{ item.id }}</td>
    <td>{{ item.name }}</td>
    <td>{{ item.description }}</td>
    <td>
      <button (click)="editItem(item.id!)">Edit</button>
      <button (click)="deleteItem(item.id!)">Delete</button>
    </td>
  </tr>
  </tbody>
</table>
